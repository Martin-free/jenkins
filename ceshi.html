<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试页面</title>
    <style>
        /* 简单的居中布局 */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        /* 白色卡片容器 */
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; }
        p { color: #666; margin-bottom: 20px; }
        
        /* 输入框和按钮样式 */
        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>👋 你好，世界！</h1>
        <p>这是一个极简的前端测试页面</p>
        
        <!-- 简单的交互区域 -->
        <div>
            <input type="text" id="myInput" placeholder="随便输入点什么...">
            <button id="myBtn">点击我</button>
        </div>
    </div>

    <script>
        // 简单的点击事件测试
        document.getElementById('myBtn').addEventListener('click', function() {
            const inputVal = document.getElementById('myInput').value;
            if (inputVal) {
                alert('你输入的内容是：' + inputVal);
            } else {
                alert('输入框是空的哦！');
            }
        });
    </script>

</body>
</html>
